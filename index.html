*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg1);color:var(--tx1);font-family:'DM Sans','Segoe UI',system-ui,sans-serif;min-height:100vh;min-height:100dvh;overscroll-behavior:none;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
input,textarea,select,button{font-family:inherit;-webkit-appearance:none}
input::placeholder,textarea::placeholder{color:var(--tx3)}
::-webkit-scrollbar{width:0;display:none}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.hd{padding:20px 16px 14px;border-bottom:1px solid var(--bd1);background:var(--bg1);position:sticky;top:0;z-index:100;transition:background .3s}
.ht{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ti{font-size:22px;font-weight:700;letter-spacing:-.03em;color:var(--tx1)}
.su{font-size:9px;color:var(--tx3);font-weight:600;letter-spacing:.06em;display:block;margin-top:1px}
.ha{display:flex;gap:8px;align-items:center}
.tb{width:36px;height:36px;border-radius:50%;cursor:pointer;border:1px solid var(--bd1);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:16px;line-height:1;transition:all .2s}
.ab{padding:7px 14px;font-size:12px;font-weight:700;border-radius:8px;cursor:pointer;border:1px solid var(--green);background:var(--green-bg);color:var(--green);transition:all .2s}
.pw{display:flex;align-items:center;gap:10px;margin-top:10px}
.pb{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.pf{height:100%;border-radius:2px;transition:width .4s;background:var(--green)}
.pt{font-size:11px;color:var(--tx3);font-weight:600;white-space:nowrap}
.rw{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center}
.ch{padding:6px 13px;font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;border:1px solid var(--bd1);background:transparent;color:var(--tx3);transition:all .15s}
.ch.a{border-color:var(--bd2);background:var(--bg2);color:var(--tx1)}
.sw{margin-top:10px;position:relative}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--tx3)}
.sx{width:100%;padding:10px 12px 10px 36px;background:var(--input-bg);border:1px solid var(--input-bd);border-radius:10px;color:var(--tx1);font-size:14px;outline:none;transition:border-color .2s}
.sx:focus{border-color:var(--blue)}
.ct{display:flex;align-items:center;gap:6px;padding:6px 12px;font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;border:1px solid var(--bd1);background:transparent;color:var(--tx2);transition:all .15s;margin-top:10px}
.ct svg{transition:transform .2s}
.ct.o svg{transform:rotate(180deg)}
.ct .cb{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;font-size:10px;font-weight:700;background:var(--blue);color:#fff;padding:0 5px}
.plw{overflow:hidden;transition:max-height .3s ease,opacity .2s;max-height:0;opacity:0}
.plw.o{max-height:200px;opacity:1}
.pls{display:flex;gap:5px;flex-wrap:wrap;padding:8px 0 2px}
.pl{padding:4px 10px;font-size:10px;font-weight:600;border-radius:16px;cursor:pointer;border:none;transition:all .15s}
.ss{padding:5px 8px;font-size:11px;font-weight:600;background:var(--input-bg);border:1px solid var(--input-bd);border-radius:6px;color:var(--tx2);cursor:pointer;outline:none;margin-left:auto}
.ls{max-width:680px;margin:0 auto;padding:12px 16px 100px}
.cn{font-size:10px;color:var(--tx3);font-weight:600;margin-bottom:10px;letter-spacing:.06em}
.cd{background:var(--card);border:1px solid var(--bd1);box-shadow:var(--shadow);border-radius:12px;padding:14px 16px;margin-bottom:8px;transition:all .2s;position:relative;overflow:hidden}
.cd.v{background:var(--card-v);border-color:rgba(34,197,94,.2)}
.cd.v .cb2{display:block}
.cb2{display:none;position:absolute;top:0;left:0;right:0;height:2px;background:var(--green)}
.ct2{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.ci{flex:1;min-width:0}
.cr{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.nm{font-size:15px;font-weight:700;letter-spacing:-.01em;color:var(--tx1)}
.cd.v .nm{color:var(--tx3);text-decoration:line-through;text-decoration-color:rgba(34,197,94,.4)}
.bd{font-size:9px;font-weight:700;letter-spacing:.04em;padding:2px 7px;border-radius:5px;text-transform:uppercase;white-space:nowrap}
.st{display:flex;align-items:center;gap:2px;margin-top:5px}
.sv{margin-left:5px;font-size:12px;font-weight:700;color:var(--star)}
.mt{margin-top:4px;font-size:11px;color:var(--tx3);display:flex;gap:10px;flex-wrap:wrap}
.hr{margin-top:2px;font-size:10px;color:var(--tx3);opacity:.7}
.bs{display:flex;flex-direction:column;gap:6px;align-items:center;flex-shrink:0}
.ib{width:40px;height:40px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;border:1.5px solid var(--bd1);background:transparent}
.ib.co{border-color:var(--green);background:var(--green-bg)}
.ib.no{border-color:var(--blue);background:var(--blue-bg)}
.nb{margin-top:8px;padding:8px 10px;border-radius:7px;background:var(--note-bg);border:1px solid var(--note-bd);font-size:12px;color:var(--note-tx);font-family:'JetBrains Mono',monospace;white-space:pre-wrap;line-height:1.4}
.ne{margin-top:10px}
.nt{width:100%;min-height:60px;padding:10px 12px;background:var(--input-bg);border:1px solid var(--input-bd);border-radius:8px;color:var(--tx1);font-size:13px;font-family:'JetBrains Mono',monospace;resize:vertical;outline:none}
.nt:focus{border-color:var(--blue)}
.ns{float:right;margin-top:6px;padding:5px 14px;font-size:11px;font-weight:600;background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue);border-radius:6px;cursor:pointer}
.af{background:var(--card);border:1px solid var(--bd1);box-shadow:var(--shadow);border-radius:14px;padding:18px;margin-bottom:12px}
.at{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.at h3{font-size:15px;font-weight:700;color:var(--tx1)}
.cx{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:18px;padding:0 4px}
.fr{display:flex;gap:8px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fl{font-size:10px;font-weight:600;color:var(--tx3);letter-spacing:.05em;text-transform:uppercase}
.fi{width:100%;padding:10px 12px;background:var(--input-bg);border:1px solid var(--input-bd);border-radius:8px;color:var(--tx1);font-size:14px;outline:none}
.fi:focus{border-color:var(--blue)}
.sb{width:100%;margin-top:6px;padding:12px;font-size:14px;font-weight:700;border-radius:9px;cursor:pointer;border:none;transition:all .2s}
.sb.on{background:var(--green);color:#fff}
.sb.of{background:var(--bg3);color:var(--tx3);cursor:default}
.em{text-align:center;padding:50px 20px;color:var(--tx3);font-size:13px}
.clb{margin-top:10px;padding:8px 18px;background:var(--bg2);border:1px solid var(--bd1);border-radius:7px;color:var(--tx2);cursor:pointer;font-size:12px}
