<style>
:root{
  --bg1:#FAFAF8;--bg2:#F0EFEB;--bg3:#E8E7E3;
  --tx1:#1A1A1A;--tx2:#5A5A58;--tx3:#8A8A86;
  --bd1:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.12);
  --card:#FFFFFF;--card-v:rgba(34,197,94,.04);
  --input-bg:rgba(0,0,0,.03);--input-bd:rgba(0,0,0,.1);
  --note-bg:rgba(59,130,246,.04);--note-bd:rgba(59,130,246,.12);
  --note-tx:rgba(30,80,180,.7);
  --shadow:0 1px 3px rgba(0,0,0,.06);
  --green:#16A34A;--green-bg:rgba(34,197,94,.08);
  --blue:#2563EB;--blue-bg:rgba(59,130,246,.06);
  --star:#E8A308;
}
[data-theme="dark"]{
  --bg1:#0A0F14;--bg2:#111820;--bg3:#1A222C;
  --tx1:#E8E8E4;--tx2:rgba(255,255,255,.5);--tx3:rgba(255,255,255,.25);
  --bd1:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.1);
  --card:rgba(16,24,28,.85);--card-v:rgba(34,197,94,.06);
  --input-bg:rgba(255,255,255,.04);--input-bd:rgba(255,255,255,.08);
  --note-bg:rgba(59,130,246,.05);--note-bd:rgba(59,130,246,.1);
  --note-tx:rgba(147,197,253,.75);
  --shadow:0 1px 4px rgba(0,0,0,.3);
  --green:#22C55E;--green-bg:rgba(34,197,94,.12);
  --blue:#3B82F6;--blue-bg:rgba(59,130,246,.08);
  --star:#F59E0B;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg1);color:var(--tx1);font-family:'DM Sans','Segoe UI',system-ui,sans-serif;min-height:100vh;min-height:100dvh;overscroll-behavior:none;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
input,textarea,select,button{font-family:inherit;-webkit-appearance:none}
input::placeholder,textarea::placeholder{color:var(--tx3)}
::-webkit-scrollbar{width:0;display:none}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.header{padding:20px 16px 14px;border-bottom:1px solid var(--bd1);background:var(--bg1);position:sticky;top:0;z-index:100;transition:background .3s}
.hdr-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.title{font-size:22px;font-weight:700;letter-spacing:-.03em;color:var(--tx1)}
.subtitle{font-size:9px;color:var(--tx3);font-weight:600;letter-spacing:.06em;display:block;margin-top:1px}
.hdr-actions{display:flex;gap:8px;align-items:center}
.theme-btn{width:36px;height:36px;border-radius:50%;cursor:pointer;border:1px solid var(--bd1);background:var(--bg2);display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:16px;line-height:1}
.add-btn{padding:7px 14px;font-size:12px;font-weight:700;border-radius:8px;cursor:pointer;border:1px solid var(--green);background:var(--green-bg);color:var(--green);transition:all .2s}
.progress-wrap{display:flex;align-items:center;gap:10px;margin-top:10px}
.progress-bar{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .4s;background:var(--green)}
.progress-text{font-size:11px;color:var(--tx3);font-weight:600;white-space:nowrap}
.row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center}
.chip{padding:6px 13px;font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;border:1px solid var(--bd1);background:transparent;color:var(--tx3);transition:all .15s}
.chip.active{border-color:var(--bd2);background:var(--bg2);color:var(--tx1)}
.search-wrap{margin-top:10px;position:relative}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--tx3)}
.search-input{width:100%;padding:10px 12px 10px 36px;background:var(--input-bg);border:1px solid var(--input-bd);border-radius:10px;color:var(--tx1);font-size:14px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--blue)}
.cuisine-toggle{display:flex;align-items:center;gap:6px;padding:6px 12px;font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;border:1px solid var(--bd1);background:transparent;color:var(--tx2);transition:all .15s;margin-top:10px}
.cuisine-toggle svg{transition:transform .2s}
.cuisine-toggle.open svg{transform:rotate(180deg)}
.cuisine-toggle .cbadge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;font-size:10px;font-weight:700;background:var(--blue);color:#fff;padding:0 5px}
.pills-wrap{overflow:hidden;transition:max-height .3s ease,opacity .2s;max-height:0;opacity:0}
.pills-wrap.open{max-height:200px;opacity:1}
.pills{display:flex;gap:5px;flex-wrap:wrap;padding:8px 0 2px}
.pill{padding:4px 10px;font-size:10px;font-weight:600;border-radius:16px;cursor:pointer;border:none;transition:all .15s}
.sort-select{padding:5px 8px;font-size:11px;font-weight:600;background:var(--input-bg);border:1px solid var(--input-bd);border-radius:6px;color:var(--tx2);cursor:pointer;outline:none;margin-left:auto}
.list{max-width:680px;margin:0 auto;padding:12px 16px 100px}
.count{font-size:10px;color:var(--tx3);font-weight:600;margin-bottom:10px;letter-spacing:.06em}
.card{background:var(--card);border:1px solid var(--bd1);box-shadow:var(--shadow);border-radius:12px;padding:14px 16px;margin-bottom:8px;transition:all .2s;position:relative;overflow:hidden}
.card.visited{background:var(--card-v);border-color:rgba(34,197,94,.2)}
.card.visited .card-bar{display:block}
.card-bar{display:none;position:absolute;top:0;left:0;right:0;height:2px;background:var(--green)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.card-info{flex:1;min-width:0}
.card-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card-name{font-size:15px;font-weight:700;letter-spacing:-.01em;color:var(--tx1)}
.card.visited .card-name{color:var(--tx3);text-decoration:line-through;text-decoration-color:rgba(34,197,94,.4)}
.badge{font-size:9px;font-weight:700;letter-spacing:.04em;padding:2px 7px;border-radius:5px;text-transform:uppercase;white-space:nowrap}
.stars{display:flex;align-items:center;gap:2px;margin-top:5px}
.star-val{margin-left:5px;font-size:12px;font-weight:700;color:var(--star)}
.card-meta{margin-top:4px;font-size:11px;color:var(--tx3);display:flex;gap:10px;flex-wrap:wrap}
.card-hours{margin-top:2px;font-size:10px;color:var(--tx3);opacity:.7}
.card-btns{display:flex;flex-direction:column;gap:6px;align-items:center;flex-shrink:0}
.icon-btn{width:40px;height:40px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;border:1.5px solid var(--bd1);background:transparent}
.icon-btn.check-on{border-color:var(--green);background:var(--green-bg)}
.icon-btn.note-on{border-color:var(--blue);background:var(--blue-bg)}
.note-box{margin-top:8px;padding:8px 10px;border-radius:7px;background:var(--note-bg);border:1px solid var(--note-bd);font-size:12px;color:var(--note-tx);font-family:'JetBrains Mono',monospace;white-space:pre-wrap;line-height:1.4}
.note-editor{margin-top:10px}
.note-textarea{width:100%;min-height:60px;padding:10px 12px;background:var(--input-bg);border:1px solid var(--input-bd);border-radius:8px;color:var(--tx1);font-size:13px;font-family:'JetBrains Mono',monospace;resize:vertical;outline:none}
.note-textarea:focus{border-color:var(--blue)}
.note-save{float:right;margin-top:6px;padding:5px 14px;font-size:11px;font-weight:600;background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue);border-radius:6px;cursor:pointer}
.add-form{background:var(--card);border:1px solid var(--bd1);box-shadow:var(--shadow);border-radius:14px;padding:18px;margin-bottom:12px}
.add-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.add-title h3{font-size:15px;font-weight:700;color:var(--tx1)}
.close-x{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:18px;padding:0 4px}
.form-row{display:flex;gap:8px}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.form-label{font-size:10px;font-weight:600;color:var(--tx3);letter-spacing:.05em;text-transform:uppercase}
.form-input{width:100%;padding:10px 12px;background:var(--input-bg);border:1px solid var(--input-bd);border-radius:8px;color:var(--tx1);font-size:14px;outline:none}
.form-input:focus{border-color:var(--blue)}
.submit-btn{width:100%;margin-top:6px;padding:12px;font-size:14px;font-weight:700;border-radius:9px;cursor:pointer;border:none;transition:all .2s}
.submit-btn.on{background:var(--green);color:#fff}
.submit-btn.off{background:var(--bg3);color:var(--tx3);cursor:default}
.empty{text-align:center;padding:50px 20px;color:var(--tx3);font-size:13px}
.clear-btn{margin-top:10px;padding:8px 18px;background:var(--bg2);border:1px solid var(--bd1);border-radius:7px;color:var(--tx2);cursor:pointer;font-size:12px}
</style>
</head>

let _no=new Set();
function load(){try{const s=localStorage.getItem("sofia-eats-v4");if(s){const d=JSON.parse(s);S.ud=d.ud||{};S.custom=d.custom||[];S.theme=d.theme||"light";}}catch(e){}document.documentElement.setAttribute("data-theme",S.theme)}
function save(){try{localStorage.setItem("sofia-eats-v4",JSON.stringify({ud:S.ud,custom:S.custom,theme:S.theme}))}catch(e){}}
function all(){return[...D,...S.custom]}
function cuis(){return[...new Set(all().map(x=>x.c))].sort()}
function esc(s){return s?s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"):""}
function dk(){return S.theme==="dark"}
function stars(r){let h='<div class="stars">';for(let i=0;i<5;i++){const f=i<Math.floor(r)?1:i===Math.floor(r)?r-Math.floor(r):0;h+=`<svg width="13" height="13" viewBox="0 0 20 20"><defs><linearGradient id="s${r}${i}"><stop offset="${f*100}%" stop-color="var(--star)"/><stop offset="${f*100}%" stop-color="${dk()?"#374151":"#D0D0CC"}"/></linearGradient></defs><path d="M10 1l2.5 5.5L18 7.5l-4 4 1 6-5-3-5 3 1-6-4-4 5.5-1z" fill="url(#s${r}${i})"/></svg>`}h+=`<span class="star-val">${r}</span></div>`;return h}
function bs(c){const o=CC[c]||{b:"#555",t:"#ccc",lb:"#eee",lt:"#333"};return dk()?`background:${o.b};color:${o.t}`:`background:${o.lb};color:${o.lt}`}
function ps(c,a){const o=CC[c]||{b:"#555",t:"#ccc",lb:"#eee",lt:"#333"};if(!a)return`background:transparent;color:var(--tx3)`;return dk()?`background:${o.b};color:${o.t}`:`background:${o.lb};color:${o.lt}`}
function card(item){const ud=S.ud[item.id]||{};const v=ud.visited;const hn=!!ud.note;const icon=item.t==="c"?"☕":item.custom?"📌":"";const gc=dk()?"#22C55E":"#16A34A";const bc=dk()?"#3B82F6":"#2563EB";
return`<div class="card${v?" visited":""}"><div class="card-bar"></div><div class="card-top"><div class="card-info"><div class="card-header">${icon?`<span style="font-size:14px">${icon}</span>`:""}<span class="card-name">${esc(item.n)}</span><span class="badge" style="${bs(item.c)}">${esc(item.c)}</span></div>${stars(item.r)}<div class="card-meta">${item.rv>0?`<span>${item.rv.toLocaleString()} reviews</span>`:""} ${item.p?`<span>${item.p}</span>`:""}<span>${esc(item.a)}</span></div>${item.h?`<div class="card-hours">${esc(item.h)}</div>`:""}</div><div class="card-btns"><button class="icon-btn${v?" check-on":""}" onclick="toggleVisit(${item.id})">${v?`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${gc}" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--tx3)" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>`}</button><button class="icon-btn${hn?" note-on":""}" onclick="toggleNote(${item.id})"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="${hn?bc:"var(--tx3)"}" stroke-width="2" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button></div></div>${hn&&!_no.has(item.id)?`<div class="note-box">${esc(ud.note)}</div>`:""} ${_no.has(item.id)?`<div class="note-editor"><textarea class="note-textarea" id="nt-${item.id}" placeholder="What did you order? Would you return?">${esc(ud.note||"")}</textarea><button class="note-save" onclick="saveNote(${item.id})">Save</button><div style="clear:both"></div></div>`:""}</div>`}
function addForm(){if(!S.addOpen)return"";const ok=S._an&&S._ac&&S._ar;return`<div class="add-form"><div class="add-title"><h3>Add a place</h3><button class="close-x" onclick="S.addOpen=false;R()">✕</button></div><div class="row" style="margin-top:0;margin-bottom:12px"><button class="chip${S._at!=="c"?" active":""}" onclick="S._at='r';R()">🍽 Restaurant</button><button class="chip${S._at==="c"?" active":""}" onclick="S._at='c';R()">☕ Coffee</button></div><div class="form-group"><div class="form-label">Name *</div><input class="form-input" id="af-n" placeholder="e.g. My Favorite Spot" value="${esc(S._an||"")}"></div><div class="form-row"><div class="form-group" style="flex:2"><div class="form-label">Cuisine / Category *</div><input class="form-input" id="af-c" placeholder="e.g. Italian, Brunch" value="${esc(S._ac||"")}"></div><div class="form-group" style="flex:1"><div class="form-label">Rating *</div><input class="form-input" id="af-r" type="number" min="0" max="5" step="0.1" placeholder="4.5" value="${S._ar||""}"></div></div><div class="form-row"><div class="form-group" style="flex:2"><div class="form-label">Address</div><input class="form-input" id="af-a" placeholder="ul. Example 12" value="${esc(S._aa||"")}"></div><div class="form-group" style="flex:1"><div class="form-label">Price</div><select class="form-input" id="af-p" style="cursor:pointer"><option value="$"${S._ap==="$"?" selected":""}>$</option><option value="$$"${(S._ap||"$$")==="$$"?" selected":""}>$$</option><option value="$$$"${S._ap==="$$$"?" selected":""}>$$$</option></select></div></div><div class="form-group"><div class="form-label">Hours (optional)</div><input class="form-input" id="af-h" placeholder="e.g. 9AM–6PM daily" value="${esc(S._ah||"")}"></div><button class="submit-btn ${ok?"on":"off"}" onclick="submitAdd()">Add to list</button></div>`}
function R(){const ap=all();const cs=cuis();const filt=ap.filter(x=>{const ms=!S.search||x.n.toLowerCase().includes(S.search.toLowerCase())||x.c.toLowerCase().includes(S.search.toLowerCase())||x.a.toLowerCase().includes(S.search.toLowerCase());const mc=S.cuisines.length===0||S.cuisines.includes(x.c);const mv=S.vis==="all"?true:S.vis==="visited"?S.ud[x.id]?.visited:!S.ud[x.id]?.visited;const mt=S.typeF==="all"?true:x.t===S.typeF;return ms&&mc&&mv&&mt}).sort((a,b)=>S.sort==="rating"?b.r-a.r:S.sort==="reviews"?b.rv-a.rv:a.n.localeCompare(b.n));const vc=Object.values(S.ud).filter(u=>u.visited).length;const sc=S.cuisines.length;
document.getElementById("app").innerHTML=`<div class="header"><div style="max-width:680px;margin:0 auto"><div class="hdr-top"><div><div class="title">Sofia Eats</div><span class="subtitle">RESTAURANTS · COFFEE · 5KM · 3.8+</span></div><div class="hdr-actions"><button class="theme-btn" onclick="toggleTheme()">${dk()?'☀️':'🌙'}</button><button class="add-btn" onclick="S.addOpen=!S.addOpen;R()">${S.addOpen?"✕ Cancel":"+ Add"}</button></div></div><div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${(vc/ap.length)*100}%"></div></div><span class="progress-text">${vc}/${ap.length}</span></div><div class="row">${[{k:"all",l:"All"},{k:"r",l:"🍽 Restaurants"},{k:"c",l:"☕ Coffee"}].map(x=>`<button class="chip${S.typeF===x.k?" active":""}" onclick="S.typeF='${x.k}';R()">${x.l}</button>`).join("")}</div><div class="search-wrap"><svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input class="search-input" id="sbox" placeholder="Search name, cuisine, address..." value="${esc(S.search)}"></div><button class="cuisine-toggle${S.cuisineOpen?" open":""}" onclick="S.cuisineOpen=!S.cuisineOpen;R()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>Filter by cuisine ${sc>0?`<span class="cbadge">${sc}</span>`:""}</button><div class="pills-wrap${S.cuisineOpen?" open":""}"><div class="pills">${cs.map(c=>{const a=S.cuisines.includes(c);return`<button class="pill" style="${ps(c,a)};border:1px solid ${a?"var(--bd2)":"var(--bd1)"}" onclick="toggleCuisine('${c.replace(/'/g,"\\'")}')">${c}</button>`}).join("")}${sc>0?`<button class="pill" style="color:var(--tx3);border:1px solid var(--bd1)" onclick="S.cuisines=[];R()">Clear all</button>`:""}</div></div><div class="row" style="margin-top:8px">${["all","visited","unvisited"].map(v=>`<button class="chip${S.vis===v?" active":""}" onclick="S.vis='${v}';R()">${v}</button>`).join("")}<select class="sort-select" id="sortbox"><option value="rating"${S.sort==="rating"?" selected":""}>Sort: Rating</option><option value="reviews"${S.sort==="reviews"?" selected":""}>Sort: Reviews</option><option value="name"${S.sort==="name"?" selected":""}>Sort: A–Z</option></select></div></div></div><div class="list">${addForm()}<div class="count">${filt.length} PLACE${filt.length!==1?"S":""}${sc?` · ${S.cuisines.join(", ")}`:""}</div>${filt.map(card).join("")}${filt.length===0?`<div class="empty">No places match your filters.<br><button class="clear-btn" onclick="S.search='';S.cuisines=[];S.vis='all';S.typeF='all';R()">Clear all filters</button></div>`:""}</div>`;
const sb=document.getElementById("sbox");if(sb)sb.addEventListener("input",e=>{S.search=e.target.value;R();setTimeout(()=>{const el=document.getElementById("sbox");if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}},0)});
const so=document.getElementById("sortbox");if(so)so.addEventListener("change",e=>{S.sort=e.target.value;R()});
["af-n","af-c","af-r","af-a","af-h"].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener("input",e=>{const m={"af-n":"_an","af-c":"_ac","af-r":"_ar","af-a":"_aa","af-h":"_ah"};S[m[id]]=e.target.value})});
const pp=document.getElementById("af-p");if(pp)pp.addEventListener("change",e=>{S._ap=e.target.value})}
window.toggleTheme=function(){S.theme=dk()?"light":"dark";document.documentElement.setAttribute("data-theme",S.theme);save();R()};
window.toggleVisit=function(id){if(!S.ud[id])S.ud[id]={};S.ud[id].visited=!S.ud[id].visited;save();R()};
window.toggleNote=function(id){_no.has(id)?_no.delete(id):_no.add(id);R();const ta=document.getElementById("nt-"+id);if(ta)ta.focus()};
window.saveNote=function(id){const ta=document.getElementById("nt-"+id);if(!ta)return;const note=ta.value.trim();if(!S.ud[id])S.ud[id]={};if(note)S.ud[id].note=note;else delete S.ud[id].note;if(!S.ud[id].note&&!S.ud[id].visited)delete S.ud[id];_no.delete(id);save();R()};
window.toggleCuisine=function(c){const i=S.cuisines.indexOf(c);if(i>=0)S.cuisines.splice(i,1);else S.cuisines.push(c);R()};
window.submitAdd=function(){if(!S._an||!S._ac||!S._ar)return;S.custom.push({id:Date.now(),n:S._an.trim(),t:S._at||"r",c:S._ac.trim(),r:Math.min(5,Math.max(0,parseFloat(S._ar)||0)),rv:0,a:S._aa?.trim()||"Sofia",p:S._ap||"$$",h:S._ah?.trim()||null,custom:true});S._an="";S._ac="";S._ar="";S._aa="";S._ah="";S._at="r";S.addOpen=false;save();R()};
load();R();
</script>
</body>
</html>
